<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سەکۆی بازرگانی کۆسمەتیک و سۆشیاڵ میدیا</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: rgba(31, 40, 51, 0.6);
            --text-color: #c5c6c7;
            --title-color: #fff;
            --accent-color: #45f3ff;
            --accent-hover: #00bfff;
            --input-bg: #1f2833;
            --header-bg: linear-gradient(135deg, #0b0c10, #1f2833);
            --border-glow: rgba(69, 243, 255, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Noto Kufi Arabic', Arial, sans-serif;
            transition: all 0.25s ease;
        }
        body {
            background: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
        }
        header {
            background: var(--header-bg);
            text-align: center;
            padding: 30px 20px;
            border-bottom: 1px solid var(--border-glow);
            box-shadow: 0 4px 30px rgba(0,0,0,0.5);
        }
        header h1 {
            color: var(--title-color);
            font-size: 2.2rem;
            text-shadow: 0 0 10px var(--accent-color);
            margin-bottom: 10px;
        }
        header p {
            color: #aaa;
            font-size: 1rem;
        }
        
        .container {
            width: 90%;
            max-width: 1200px;
            margin: 30px auto;
        }

        /* بەشی ئەکاونت */
        .auth-box {
            background: var(--card-bg);
            border: 1px solid var(--accent-color);
            max-width: 450px;
            margin: 40px auto;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(69, 243, 255, 0.1);
            backdrop-filter: blur(15px);
        }
        .auth-tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--input-bg);
        }
        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            font-weight: bold;
            color: #888;
        }
        .auth-tab.active {
            color: var(--accent-color);
            border-bottom: 2px solid var(--accent-color);
        }
        input, select {
            width: 100%;
            padding: 12px 20px;
            background: var(--input-bg);
            border: 1px solid var(--border-glow);
            color: var(--title-color);
            border-radius: 30px;
            margin-bottom: 15px;
            outline: none;
            font-size: 15px;
        }
        input:focus, select:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 10px var(--border-glow);
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--accent-color), var(--accent-hover));
            color: #000;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(69, 243, 255, 0.2);
        }
        .btn:hover {
            box-shadow: 0 0 25px var(--accent-color);
            transform: scale(1.02);
        }

        /* دوگمەی سەرەکی پلاتفۆرمەکان */
        .platform-tabs {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }
        .platform-btn {
            background: var(--card-bg);
            color: var(--title-color);
            border: 1px solid var(--border-glow);
            padding: 12px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
        }
        .platform-btn img {
            width: 25px;
            height: 25px;
            object-fit: contain;
        }
        .platform-btn:hover {
            border-color: var(--accent-color);
            transform: translateY(-2px);
        }
        .platform-btn.active {
            background: var(--title-color);
            color: #000;
            border-color: transparent;
            box-shadow: 0 0 15px rgba(255,255,255,0.5);
        }

        /* بەشی جۆری خزمەتگوزاری ناوخۆیی */
        .sub-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            background: rgba(255,255,255,0.03);
            padding: 8px;
            border-radius: 30px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        .sub-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-color);
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
        }
        .sub-btn.active {
            background: var(--accent-color);
            color: #000;
            font-weight: bold;
        }

        /* جێگیرکردنی کارتەکان */
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .sub-content {
            display: none;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            animation: fadeIn 0.4s ease;
        }
        .sub-content.active {
            display: grid;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-glow);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            position: relative;
        }
        .card:hover {
            border-color: var(--accent-color);
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(69, 243, 255, 0.1);
        }
        .card img {
            width: 65px;
            height: 65px;
            margin: 0 auto 15px;
            display: block;
            object-fit: contain;
        }
        .card h3 {
            color: var(--title-color);
            font-size: 1.2rem;
            margin-bottom: 8px;
        }
        .price {
            color: #ffd700;
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .card button {
            width: 100%;
            padding: 10px;
            border-radius: 20px;
            background: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            font-weight: bold;
            cursor: pointer;
        }
        .card button:hover {
            background: var(--accent-color);
            color: #000;
        }

        /* بەشی حاسیبەی خێرا */
        .calculator-section {
            background: var(--card-bg);
            border: 1px solid var(--border-glow);
            padding: 25px;
            border-radius: 15px;
            margin-top: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .calc-grid {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .calc-grid > div {
            flex: 1;
            min-width: 200px;
        }
        .calc-result {
            margin-top: 15px;
            font-size: 1.2rem;
            color: #ffd700;
            font-weight: bold;
        }

        /* مۆدێل / فۆرمی کڕینی خێرا */
        .order-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: #1f2833;
            border: 1px solid var(--accent-color);
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            position: relative;
        }
        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 1.8rem;
            cursor: pointer;
            color: #fff;
        }

        /* دوگمەی لۆگئاوت */
        .logout-btn {
            background: #ff4d4d;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>✨ سروشتی تۆ & کوردستان ستۆر</h1>
        <p>خێراترین سەکۆ بۆ بازرگانی کۆسمەتیک، خزمەتگوزاری پێست و سۆشیاڵ میدیا</p>
        <div id="welcome" style="display:none; color:var(--accent-color); font-size:18px; margin-top:10px; font-weight:bold;"></div>
        <button id="logoutBtn" class="logout-btn" onclick="logout()">چوونەدەرەوە</button>
    </header>

    <!-- بەشی لۆگین و ئەکاونت دروستکردن -->
    <div class="auth-box" id="authSection">
        <div class="auth-tabs">
            <div class="auth-tab active" id="tabLogin" onclick="switchAuth('login')">چوونەژوورەوە</div>
            <div class="auth-tab" id="tabSignup" onclick="switchAuth('signup')">تۆماربوون</div>
        </div>
        
        <div id="authFields">
            <input type="text" id="username" placeholder="ناوی بەکارهێنەر" style="display:none;">
            <input type="email" id="email" placeholder="ئیمەیڵ">
            <input type="password" id="password" placeholder="وشەی تێپەڕبوون">
            <button class="btn" id="authBtn" onclick="handleAuth()">بچۆ ژوورەوە</button>
            <p id="authMsg" style="text-align:center; margin-top:10px; color:#ff4d4d; font-size:14px;"></p>
        </div>
    </div>

    <!-- تەواوی خزمەتگوزارییەکان (تەنها دوای لۆگین دیار دەبێت) -->
    <div class="container" id="storeContent" style="display:none;">
        
        <!-- تابە سەرەکییەکانی پلاتفۆرمەکان -->
        <div class="platform-tabs">
            <button class="platform-btn active" onclick="openPlatform(event, 'tiktok')"><img src="https://cdn-icons-png.flaticon.com/512/3046/3046124.png" alt="">TikTok</button>
            <button class="platform-btn" onclick="openPlatform(event, 'instagram')"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="">Instagram</button>
            <button class="platform-btn" onclick="openPlatform(event, 'facebook')"><img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="">Facebook</button>
            <button class="platform-btn" onclick="openPlatform(event, 'youtube')"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" alt="">YouTube</button>
            <button class="platform-btn" onclick="openPlatform(event, 'telegram')"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png" alt="">Telegram</button>
        </div>

        <!-- ================= TIKTOK ================= -->
        <div id="tiktok" class="tab-content active">
            <div class="sub-tabs">
                <button class="sub-btn active" onclick="openSubTab(event, 'tiktok', 'views')">ڤیوو (Views)</button>
                <button class="sub-btn" onclick="openSubTab(event, 'tiktok', 'likes')">لایک (Likes)</button>
                <button class="sub-btn" onclick="openSubTab(event, 'tiktok', 'followers')">فۆڵۆو (Followers)</button>
                <button class="sub-btn" onclick="openSubTab(event, 'tiktok', 'comments')">کۆمێنت (Comments)</button>
            </div>
            <div id="tiktok-views" class="sub-content active"></div>
            <div id="tiktok-likes" class="sub-content"></div>
            <div id="tiktok-followers" class="sub-content"></div>
            <div id="tiktok-comments" class="sub-content"></div>
        </div>

        <!-- ================= INSTAGRAM ================= -->
        <div id="instagram" class="tab-content">
            <div class="sub-tabs">
                <button class="sub-btn active" onclick="openSubTab(event, 'instagram', 'views')">ڤیوو (Views)</button>
                <button class="sub-btn" onclick="openSubTab(event, 'instagram', 'likes')">لایک (Likes)</button>
                <button class="sub-btn" onclick="openSubTab(event, 'instagram', 'followers')">فۆڵۆو (Followers)</button>
                <button class="sub-btn" onclick="openSubTab(event, 'instagram', 'comments')">کۆمێنت (Comments)</button>
            </div>
            <div id="instagram-views" class="sub-content active"></div>
            <div id="instagram-likes" class="sub-content"></div>
            <div id="instagram-followers" class="sub-content"></div>
            <div id="instagram-comments" class="sub-content"></div>
        </div>

        <!-- ================= FACEBOOK ================= -->
        <div id="facebook" class="tab-content">
            <div class="sub-tabs">
                <button class="sub-btn active" onclick="openSubTab(event, 'facebook', 'views')">ڤیوو (Views)</button>
                <button class="sub-btn" onclick="openSubTab(event, 'facebook', 'likes')">لایک (Likes)</button>
                <button class="sub-btn" onclick="openSubTab(event, 'facebook', 'followers')">فۆڵۆو (Followers)</button>
                <button class="sub-btn" onclick="openSubTab(event, 'facebook', 'comments')">کۆمێنت (Comments)</button>
            </div>
            <div id="facebook-views" class="sub-content active"></div>
            <div id="facebook-likes" class="sub-content"></div>
            <div id="facebook-followers" class="sub-content"></div>
            <div id="facebook-comments" class="sub-content"></div>
        </div>

        <!-- ================= YOUTUBE ================= -->
        <div id="youtube" class="tab-content">
            <div class="sub-tabs">
                <button class="sub-btn active" onclick="openSubTab(event, 'youtube', 'views')">ڤیوو (Views)</button>
                <button class="sub-btn" onclick="openSubTab(event, 'youtube', 'likes')">لایک (Likes)</button>
                <button class="sub-btn" onclick="openSubTab(event, 'youtube', 'followers')">فۆڵۆو (Followers)</button>
                <button class="sub-btn" onclick="openSubTab(event, 'youtube', 'comments')">کۆمێنت (Comments)</button>
            </div>
            <div id="youtube-views" class="sub-content active"></div>
            <div id="youtube-likes" class="sub-content"></div>
            <div id="youtube-followers" class="sub-content"></div>
            <div id="youtube-comments" class="sub-content"></div>
        </div>

        <!-- ================= TELEGRAM ================= -->
        <div id="telegram" class="tab-content">
            <div class="sub-tabs">
                <button class="sub-btn active" onclick="openSubTab(event, 'telegram', 'views')">ڤیوو (Views)</button>
                <button class="sub-btn" onclick="openSubTab(event, 'telegram', 'likes')">لایک (Likes)</button>
                <button class="sub-btn" onclick="openSubTab(event, 'telegram', 'followers')">فۆڵۆو (Followers)</button>
                <button class="sub-btn" onclick="openSubTab(event, 'telegram', 'comments')">کۆمێنت (Comments)</button>
            </div>
            <div id="telegram-views" class="sub-content active"></div>
            <div id="telegram-likes" class="sub-content"></div>
            <div id="telegram-followers" class="sub-content"></div>
            <div id="telegram-comments" class="sub-content"></div>
        </div>

        <!-- ================= بەشی حاسیبەی خێرا ================= -->
        <div class="calculator-section">
            <h2 style="color:var(--title-color); margin-bottom:15px; font-size:1.4rem;">🧮 حاسیبەی خێرا بۆ خملاندنی نرخ</h2>
            <div class="calc-grid">
                <div>
                    <label>جۆری تۆڕ</label>
                    <select id="calcPlatform">
                        <option value="450">TikTok / Instagram (هەرزان)</option>
                        <option value="600">Facebook / Telegram (ناوەند)</option>
                        <option value="800">YouTube (پریمیۆم)</option>
                    </select>
                </div>
                <div>
                    <label>بڕی پێویست (بە ژمارە بنووسە - بۆ نموونە 10000)</label>
                    <input type="number" id="calcAmount" value="5000" oninput="calculatePrice()">
                </div>
            </div>
            <div class="calc-result" id="calcResult">کۆیی گشتی خەمڵێندراو: 2,250 د.ع</div>
        </div>
    </div>

    <!-- مۆدێل / فۆرمی داواکاری خێرا -->
    <div class="order-modal" id="orderModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeOrderModal()">&times;</span>
            <h3 style="margin-bottom: 1.5rem; color:var(--title-color);" id="modalTitle">تۆمارکردنی داواکاری</h3>
            <form id="whatsappForm" onsubmit="sendToWhatsapp(event)">
                <input type="hidden" id="orderItemName">
                <input type="hidden" id="orderItemPrice">
                
                <div>
                    <label style="color:#fff; display:block; margin-bottom:5px;">ناوی تەواو</label>
                    <input type="text" id="clientName" required placeholder="ناوی سێانی بنووسە">
                </div>
                <div>
                    <label style="color:#fff; display:block; margin-bottom:5px;">ژمارەی مۆبایل</label>
                    <input type="tel" id="clientPhone" required placeholder="0750XXXXXXX">
                </div>
                <div>
                    <label style="color:#fff; display:block; margin-bottom:5px;">لینکی ئەکاونت یان پۆست</label>
                    <input type="url" id="clientLink" required placeholder="https://...">
                </div>
                <button type="submit" class="btn" style="background: #25D366; color: #fff;">ناردنی داواکاری بۆ واتسئاپ 💬</button>
            </form>
        </div>
    </div>

    <script>
        let currentMode = 'login';
        const logos = {
            tiktok: "https://cdn-icons-png.flaticon.com/512/3046/3046124.png",
            instagram: "https://cdn-icons-png.flaticon.com/512/2111/2111463.png",
            facebook: "https://cdn-icons-png.flaticon.com/512/733/733547.png",
            youtube: "https://cdn-icons-png.flaticon.com/512/1384/1384060.png",
            telegram: "https://cdn-icons-png.flaticon.com/512/2111/2111646.png"
        };

        // گۆڕینی دۆخی لۆگین و تۆماربوون
        function switchAuth(mode) {
            currentMode = mode;
            document.getElementById("authMsg").innerText = "";
            document.getElementById("tabLogin").classList.toggle("active", mode === 'login');
            document.getElementById("tabSignup").classList.toggle("active", mode === 'signup');
            document.getElementById("username").style.display = mode === 'signup' ? 'block' : 'none';
            document.getElementById("authBtn").innerText = mode === 'signup' ? 'تۆماربوون' : 'بچۆ ژوورەوە';
        }

        // بەڕێوەبردنی لۆگین و تۆماربوون
        function handleAuth() {
            const u = document.getElementById("username").value;
            const e = document.getElementById("email").value;
            const p = document.getElementById("password").value;
            const msg = document.getElementById("authMsg");

            if (currentMode === 'signup') {
                if (!u || !e || !p) { msg.innerText = "تکایە هەموو خانەکان پڕبکەرەوە!"; return; }
                localStorage.setItem("storedUser", JSON.stringify({username: u, email: e, password: p}));
                msg.style.color = "lightgreen";
                msg.innerText = "ئەکاونت دروستکرا! ئێستا لۆگین بکە.";
                switchAuth('login');
            } else {
                if (!e || !p) { msg.innerText = "تکایە ئیمەیڵ و وشەی تێپەڕبوون بنووسە!"; return; }
                const saved = JSON.parse(localStorage.getItem("storedUser"));
                if (saved && saved.email === e && saved.password === p) {
                    document.getElementById("authSection").style.display = "none";
                    document.getElementById("welcome").innerText = `👤 بەخێربێیت، ${saved.username}`;
                    document.getElementById("welcome").style.display = "block";
                    document.getElementById("logoutBtn").style.display = "inline-block";
                    document.getElementById("storeContent").style.display = "block";
                } else {
                    msg.style.color = "#ff4d4d";
                    msg.innerText = "زانیارییەکان هەڵەن یان ئەکاونتت نییە!";
                }
            }
        }

        function logout() {
            document.getElementById("storeContent").style.display = "none";
            document.getElementById("welcome").style.display = "none";
            document.getElementById("logoutBtn").style.display = "none";
            document.getElementById("authSection").style.display = "block";
            document.getElementById("email").value = "";
            document.getElementById("password").value = "";
        }

        // گۆڕینی پلاتفۆرمەکان
        function openPlatform(evt, platformName) {
            const contents = document.getElementsByClassName("tab-content");
            for (let i = 0; i < contents.length; i++) contents[i].classList.remove("active");
            
            const btns = document.getElementsByClassName("platform-btn");
            for (let i = 0; i < btns.length; i++) btns[i].classList.remove("active");

            document.getElementById(platformName).classList.add("active");
            evt.currentTarget.classList.add("active");
        }

        // گۆڕینی بەشە ناوخۆییەکان
        function openSubTab(evt, platform, subType) {
            const parent = document.getElementById(platform);
            const contents = parent.getElementsByClassName("sub-content");
            for (let i = 0; i < contents.length; i++) contents[i].classList.remove("active");

            const btns = parent.getElementsByClassName("sub-btn");
            for (let i = 0; i < btns.length; i++) btns[i].classList.remove("active");

            document.getElementById(`${platform}-${subType}`).classList.add("active");
            evt.currentTarget.classList.add("active");
        }

        // بەڕێوەبردنی فۆرمی مۆدێلی داواکاری خێرا
        function openOrderModal(name, price) {
            document.getElementById("orderItemName").value = name;
            document.getElementById("orderItemPrice").value = price;
            document.getElementById("modalTitle").innerText = `داواکردنی: ${name} (${price})`;
            document.getElementById("orderModal").style.display = "flex";
        }

        function closeOrderModal() {
            document.getElementById("orderModal").style.display = "none";
            document.getElementById("whatsappForm").reset();
        }

        // ناردنی داواکاری بۆ واتسئاپ
        function sendToWhatsapp(event) {
            event.preventDefault();
            const itemName = document.getElementById("orderItemName").value;
            const itemPrice = document.getElementById("orderItemPrice").value;
            const clientName = document.getElementById("clientName").value;
            const clientPhone = document.getElementById("clientPhone").value;
            const clientLink = document.getElementById("clientLink").value;

            // ژمارەی مۆبایلی فەرمی خاوەن ماڵپەڕ
            const myWhatsappNumber = "9647751513431"; 

            const text = `سڵاو کاک ژیار، داواکارییەکی نوێم هەیە لە ماڵپەڕەکەتەوە:\n\n` +
                         `📦 پاکێج: ${itemName}\n` +
                         `💰 نرخ: ${itemPrice}\n` +
                         `👤 ناوی کڕیار: ${clientName}\n` +
                         `📞 تەلەفۆن: ${clientPhone}\n` +
                         `🔗 لینک: ${clientLink}`;

            const encodedText = encodeURIComponent(text);
            window.open(`https://wa.me/${myWhatsappNumber}?text=${encodedText}`, '_blank');
            closeOrderModal();
        }

        // سیستمی حاسیبەی خێرا
        function calculatePrice() {
            const rate = parseFloat(document.getElementById("calcPlatform").value);
            const amount = parseInt(document.getElementById("calcAmount").value) || 0;
            const total = (amount / 1000) * rate;
            document.getElementById("calcResult").innerText = `کۆیی گشتی خەمڵێندراو: ${Math.round(total).toLocaleString()} د.ع`;
        }

        // دروستکردنی ئۆتۆماتیکی کارتەکان (5K تا 100K بە پلەبەندی 5K)
        function generateAllServices() {
            const platforms = ['tiktok', 'instagram', 'facebook', 'youtube', 'telegram'];
            const subTypes = ['views', 'likes', 'followers', 'comments'];

            platforms.forEach(p => {
                subTypes.forEach(s => {
                    const container = document.getElementById(`${p}-${s}`);
                    if (!container) return;
                    
                    let htmlContent = '';
                    let basePriceFactor = p === 'youtube' ? 800 : (p === 'facebook' || p === 'telegram' ? 600 : 450);

                    for (let amount = 5; amount <= 100; amount += 5) {
                        let calcPrice = amount * basePriceFactor;
                        let priceText = calcPrice.toLocaleString() + " د.ع";
                        let typeNameKurdish = s === 'views' ? 'ڤیوو' : s === 'likes' ? 'لایک' : s === 'followers' ? 'فۆڵۆو' : 'کۆمێنت';
                        let title = `${amount}K ${typeNameKurdish} ${p.toUpperCase()}`;

                        htmlContent += `
                            <div class="card">
                                <img src="${logos[p]}" alt="${p}">
                                <h3>${amount}K ${typeNameKurdish}</h3>
                                <div class="price">${priceText}</div>
                                <button onclick="openOrderModal('${title}', '${priceText}')">ئێستا بکڕە</button>
                            </div>
                        `;
                    }
                    container.innerHTML = htmlContent;
                });
            });
        }

        window.onload = function() {
            generateAllServices();
            calculatePrice();
        };
    </script>
</body>
</html>
